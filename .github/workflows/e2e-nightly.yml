name: E2E Nightly

on:
  schedule:
    - cron: "0 7 * * *" # 7am UTC daily
  workflow_dispatch:

concurrency:
  group: e2e-nightly
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  issues: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      PLATFORM_URL: http://localhost:9999
      AUTH_SECRET: ${{ secrets.AUTH_SECRET != '' && secrets.AUTH_SECRET || 'e2e-ci-placeholder-secret-min32chars!!' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Playwright browsers cache
        id: playwright-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Install Playwright Chromium browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        timeout-minutes: 5

      - name: Save Playwright browsers cache
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Seed demo admin for e2e tests
        run: npm run create-admin -- "--email=$E2E_ADMIN_EMAIL" "--password=$E2E_ADMIN_PASSWORD" "--name=Admin"
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          E2E_ADMIN_EMAIL: admin@artisanroast.com
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_DEMO_ADMIN_PASSWORD }}

      - name: Run E2E tests
        env:
          E2E_ADMIN_EMAIL: admin@artisanroast.com
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_DEMO_ADMIN_PASSWORD }}
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4.6.2
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Open GitHub issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "E2E tests failed — $(date -u '+%Y-%m-%d')" \
            --label "bug" \
            --body "## E2E Nightly Failed

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Commit: \`${{ github.sha }}\`

          Check the Playwright report artifact for details."
